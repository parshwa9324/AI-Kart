<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="blazerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="lapelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
  </defs>
  <!-- Body -->
  <path d="M100 0 L60 15 L0 80 L25 130 L70 95 L65 490 L335 490 L330 95 L375 130 L400 80 L340 15 L300 0 Q270 60 200 65 Q130 60 100 0 Z" fill="url(#blazerGrad)" stroke="#111" stroke-width="1.5"/>
  <!-- Left lapel -->
  <path d="M100 0 Q130 60 200 65 L200 200 L120 60 Z" fill="url(#lapelGrad)" stroke="#111" stroke-width="1"/>
  <!-- Right lapel -->
  <path d="M300 0 Q270 60 200 65 L200 200 L280 60 Z" fill="url(#lapelGrad)" stroke="#111" stroke-width="1"/>
  <!-- Center line -->
  <line x1="200" y1="65" x2="200" y2="490" stroke="#111" stroke-width="2" opacity="0.6"/>
  <!-- Buttons -->
  <circle cx="200" cy="220" r="5" fill="#444" stroke="#333" stroke-width="1"/>
  <circle cx="200" cy="310" r="5" fill="#444" stroke="#333" stroke-width="1"/>
  <!-- Pocket lines -->
  <line x1="110" y1="260" x2="170" y2="260" stroke="#111" stroke-width="1.5" opacity="0.5"/>
  <line x1="230" y1="260" x2="290" y2="260" stroke="#111" stroke-width="1.5" opacity="0.5"/>
  <!-- Fold shadows -->
  <line x1="130" y1="100" x2="125" y2="480" stroke="#111" stroke-width="1" opacity="0.15"/>
  <line x1="270" y1="100" x2="275" y2="480" stroke="#111" stroke-width="1" opacity="0.15"/>
</svg>
